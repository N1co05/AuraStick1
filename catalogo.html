<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explorá nuestro catálogo completo de stickers premium. Filtrá por categoría y armá tu pedido.">
    <title>Catálogo — Aura Sticks</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <style>
        /* ── LAYOUT ── */
        .catalog-page {
            padding: 100px 0 60px;
            min-height: 100vh;
        }

        .catalog-header { margin-bottom: 40px; }

        .catalog-toolbar {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .search-wrapper {
            flex: 1;
            min-width: 260px;
            position: relative;
        }
        .search-wrapper svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-500);
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            border: 2px solid var(--gray-300);
            border-radius: var(--radius-full);
            font-size: 0.95rem;
            outline: none;
            background: var(--gray-100);
            color: var(--gray-900);
            transition: border-color var(--duration) var(--ease), box-shadow var(--duration) var(--ease);
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(240, 101, 149, 0.1);
        }
        .search-input::placeholder { color: var(--gray-500); }

        .sort-select {
            padding: 14px 18px;
            border: 2px solid var(--gray-300);
            border-radius: var(--radius-full);
            font-size: 0.88rem;
            font-weight: 600;
            outline: none;
            background: var(--gray-100);
            color: var(--gray-800);
            cursor: pointer;
            transition: border-color var(--duration) var(--ease);
        }
        .sort-select:focus { border-color: var(--primary); }

        /* ── CATEGORIES ── */
        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
            margin-bottom: 8px;
        }
        .categories::-webkit-scrollbar { display: none; }

        .cat-chip {
            padding: 9px 22px;
            border-radius: var(--radius-full);
            white-space: nowrap;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            border: 2px solid var(--gray-300);
            background: var(--gray-100);
            color: var(--gray-600);
            transition: all var(--duration) var(--ease);
        }
        .cat-chip:hover {
            border-color: var(--primary);
            color: var(--primary-light);
            background: rgba(240, 101, 149, 0.08);
        }
        .cat-chip.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border-color: var(--primary);
            box-shadow: var(--shadow-pink);
        }

        /* ── RESULTS INFO ── */
        .results-info {
            font-size: 0.85rem;
            color: var(--gray-500);
            margin-bottom: 24px;
        }
        .results-info strong { color: var(--gray-800); }

        /* ── PRODUCT GRID ── */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: var(--surface-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: all 0.4s var(--ease);
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px -15px rgba(240, 101, 149, 0.2);
            border-color: rgba(240, 101, 149, 0.15);
        }

        .product-img-wrap {
            width: 100%;
            aspect-ratio: 1;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .product-img-wrap img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            transition: transform 0.5s var(--ease);
        }
        .product-card:hover .product-img-wrap img {
            transform: scale(1.1) rotate(2deg);
        }

        .product-tag {
            position: absolute;
            top: 12px;
            left: 12px;
        }

        .product-body { padding: 18px 20px 20px; }

        .product-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
            color: var(--gray-800);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-price {
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--primary);
            margin-bottom: 14px;
        }

        .qty-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .qty-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--gray-300);
            background: var(--gray-100);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-700);
            transition: all var(--duration) var(--ease);
        }
        .qty-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(240, 101, 149, 0.1);
        }
        .qty-value {
            width: 40px;
            text-align: center;
            font-weight: 800;
            font-size: 1.05rem;
            color: var(--gray-900);
        }

        .add-btn {
            flex: 1;
            margin-left: 10px;
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            box-shadow: var(--shadow-pink);
        }
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px -4px var(--primary-glow);
        }
        .add-btn:disabled {
            opacity: 0.5;
            cursor: default;
            transform: none;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--gray-500);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-state h3 { font-size: 1.2rem; color: var(--gray-700); margin-bottom: 8px; }

        /* ── LOADING ── */
        .loading-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }
        .skel-card { border-radius: var(--radius-lg); overflow: hidden; }
        .skel-img { width: 100%; aspect-ratio: 1; }
        .skel-body { padding: 18px 20px; }
        .skel-line { height: 16px; margin-bottom: 10px; border-radius: 8px; }
        .skel-line--short { width: 60%; }
        .skel-line--btn { height: 38px; border-radius: var(--radius-full); margin-top: 8px; }

        /* ── FLOATING CART BAR ── */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 8000;
            transform: translateY(100%);
            transition: transform 0.4s var(--ease-spring);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-top: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 -4px 30px rgba(166, 30, 77, 0.1);
        }
        .cart-bar.visible { transform: translateY(0); }
        .cart-bar-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: var(--gray-800);
        }
        .cart-bar-count {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            box-shadow: var(--shadow-pink);
        }
        .cart-bar-total {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--primary);
        }
        .whatsapp-btn {
            padding: 12px 28px;
            border: none;
            border-radius: var(--radius-full);
            background: #25D366;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--duration) var(--ease);
            box-shadow: 0 8px 24px rgba(37, 211, 102, 0.3);
        }
        .whatsapp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(37, 211, 102, 0.4);
        }

        /* ── FOOTER ── */
        .footer {
            padding: 40px 0 100px;
            text-align: center;
            color: var(--gray-500);
            font-size: 0.85rem;
            border-top: 1px solid var(--glass-border);
        }
        .footer a { color: var(--primary); font-weight: 600; }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
            .product-body { padding: 12px 14px 14px; }
            .product-name { font-size: 0.88rem; }
            .product-price { font-size: 1.05rem; margin-bottom: 10px; }
            .qty-btn { width: 32px; height: 32px; font-size: 0.9rem; }
            .add-btn { padding: 8px 10px; font-size: 0.78rem; }
            .cart-bar { padding: 12px 16px; }
        }
        @media (max-width: 480px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="page-bg"></div>
    <div class="bg-blob bg-blob--1"></div>
    <div class="bg-blob bg-blob--2"></div>

    <!-- NAVBAR -->
    <nav class="navbar" id="main-nav">
        <div class="navbar-brand">
            <img src="src/assets/logo.png" alt="Aura Sticks" class="navbar-logo">
            <span class="logo-text">Aura Sticks</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="catalogo.html" class="active">Catálogo</a>
            <a href="admin.html">Admin</a>
        </div>
    </nav>

    <!-- CATALOG -->
    <section class="catalog-page">
        <div class="container">
            <div class="catalog-header">
                <div class="section-label reveal">🛍️ Tienda</div>
                <h1 class="section-title reveal">Catálogo</h1>
                <p class="section-subtitle reveal" style="margin-bottom: 24px;">Encontrá el sticker perfecto para vos</p>
            </div>

            <div class="catalog-toolbar reveal">
                <div class="search-wrapper">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" class="search-input" id="search-input" placeholder="Buscar stickers...">
                </div>
                <select class="sort-select" id="sort-select">
                    <option value="newest">Más nuevos</option>
                    <option value="price-asc">Precio: menor a mayor</option>
                    <option value="price-desc">Precio: mayor a menor</option>
                    <option value="name">Nombre A-Z</option>
                </select>
            </div>

            <div class="categories reveal" id="category-list">
                <div class="cat-chip active" data-cat="Todos">Todos</div>
            </div>

            <div class="results-info" id="results-info"></div>

            <!-- Loading skeleton -->
            <div class="loading-grid" id="loading-skeleton">
                <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-body"><div class="skel-line skeleton"></div><div class="skel-line skel-line--short skeleton"></div><div class="skel-line skel-line--btn skeleton"></div></div></div>
                <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-body"><div class="skel-line skeleton"></div><div class="skel-line skel-line--short skeleton"></div><div class="skel-line skel-line--btn skeleton"></div></div></div>
                <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-body"><div class="skel-line skeleton"></div><div class="skel-line skel-line--short skeleton"></div><div class="skel-line skel-line--btn skeleton"></div></div></div>
                <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-body"><div class="skel-line skeleton"></div><div class="skel-line skel-line--short skeleton"></div><div class="skel-line skel-line--btn skeleton"></div></div></div>
            </div>

            <div class="product-grid" id="product-grid" style="display: none;"></div>
        </div>
    </section>

    <!-- CART BAR -->
    <div class="cart-bar" id="cart-bar">
        <div class="cart-bar-info">
            <div class="cart-bar-count" id="cart-count">0</div>
            <span>productos</span>
            <span>·</span>
            <span class="cart-bar-total" id="cart-total">$0</span>
        </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 <a href="index.html">Aura Sticks</a> — Todos los derechos reservados</p>
        </div>
    </footer>

    <script>
        // ═══ PARTICLES (lighter version for catalog) ═══
        (function() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize(); window.addEventListener('resize', resize);
            class P {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 1.5 + 0.3;
                    this.speedX = (Math.random() - 0.5) * 0.2;
                    this.speedY = (Math.random() - 0.5) * 0.2;
                    this.opacity = Math.random() * 0.3 + 0.05;
                    this.pulse = Math.random() * Math.PI * 2;
                }
                update() { this.x += this.speedX; this.y += this.speedY; this.pulse += 0.02; if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset(); }
                draw() { const g = Math.sin(this.pulse) * 0.3 + 0.7; ctx.beginPath(); ctx.arc(this.x, this.y, this.size * g, 0, Math.PI * 2); ctx.fillStyle = `rgba(240, 101, 149, ${this.opacity * g})`; ctx.fill(); }
            }
            for (let i = 0; i < 30; i++) particles.push(new P());
            function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
            animate();
        })();

        // ═══ SCROLL REVEAL ═══
        const reveals = document.querySelectorAll('.reveal');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, i) => {
                if (entry.isIntersecting) { setTimeout(() => entry.target.classList.add('visible'), i * 80); observer.unobserve(entry.target); }
            });
        }, { threshold: 0.1 });
        reveals.forEach(el => observer.observe(el));

        // ═══ NAVBAR SCROLL ═══
        const nav = document.getElementById('main-nav');
        window.addEventListener('scroll', () => {
            nav.style.background = window.scrollY > 50 ? 'rgba(255, 255, 255, 0.92)' : '';
            nav.style.boxShadow = window.scrollY > 50 ? '0 4px 30px rgba(166, 30, 77, 0.1)' : '';
        });
    </script>
    <script type="module" src="src/pages/catalogo.js"></script>
</body>
</html>
