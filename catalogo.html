<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explorá nuestro catálogo completo de stickers premium. Filtrá por categoría y armá tu pedido.">
    <title>Catálogo — Aura Sticks</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <style>
        /* ── LAYOUT ── */
        .catalog-page {
            padding: 100px 0 60px;
            min-height: 100vh;
        }

        .catalog-header {
            margin-bottom: 32px;
        }

        .catalog-toolbar {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .search-wrapper {
            flex: 1;
            min-width: 260px;
            position: relative;
        }
        .search-wrapper svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-full);
            font-size: 0.95rem;
            outline: none;
            background: #fff;
            transition: border-color var(--duration) var(--ease), box-shadow var(--duration) var(--ease);
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(230, 73, 128, 0.1);
        }

        .sort-select {
            padding: 14px 18px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-full);
            font-size: 0.88rem;
            font-weight: 600;
            outline: none;
            background: #fff;
            color: var(--gray-700);
            cursor: pointer;
            transition: border-color var(--duration) var(--ease);
        }
        .sort-select:focus { border-color: var(--primary); }

        /* ── CATEGORIES ── */
        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
            margin-bottom: 8px;
        }
        .categories::-webkit-scrollbar { display: none; }

        .cat-chip {
            padding: 9px 22px;
            border-radius: var(--radius-full);
            white-space: nowrap;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            border: 2px solid var(--gray-200);
            background: #fff;
            color: var(--gray-600);
            transition: all var(--duration) var(--ease);
        }
        .cat-chip:hover {
            border-color: var(--primary-light);
            color: var(--primary);
        }
        .cat-chip.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: var(--shadow-pink);
        }

        /* ── RESULTS INFO ── */
        .results-info {
            font-size: 0.85rem;
            color: var(--gray-500);
            margin-bottom: 24px;
        }
        .results-info strong {
            color: var(--gray-800);
        }

        /* ── PRODUCT GRID ── */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: #fff;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all var(--duration) var(--ease);
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }

        .product-img-wrap {
            width: 100%;
            aspect-ratio: 1;
            background: var(--gray-50);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .product-img-wrap img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            transition: transform 0.4s var(--ease);
        }
        .product-card:hover .product-img-wrap img {
            transform: scale(1.08);
        }

        .product-tag {
            position: absolute;
            top: 12px;
            left: 12px;
        }

        .product-body {
            padding: 18px 20px 20px;
        }

        .product-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
            color: var(--gray-800);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-price {
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--primary);
            margin-bottom: 14px;
        }

        .qty-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .qty-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--gray-200);
            background: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-700);
            transition: all var(--duration) var(--ease);
        }
        .qty-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--pink-50);
        }
        .qty-value {
            width: 40px;
            text-align: center;
            font-weight: 800;
            font-size: 1.05rem;
            color: var(--gray-900);
        }

        .add-btn {
            flex: 1;
            margin-left: 10px;
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--primary), var(--pink-600));
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            box-shadow: var(--shadow-pink);
        }
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px -4px var(--primary-glow);
        }
        .add-btn:disabled {
            opacity: 0.5;
            cursor: default;
            transform: none;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--gray-500);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-state h3 { font-size: 1.2rem; color: var(--gray-700); margin-bottom: 8px; }

        /* ── LOADING ── */
        .loading-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }
        .skel-card {
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .skel-img { width: 100%; aspect-ratio: 1; }
        .skel-body { padding: 18px 20px; }
        .skel-line { height: 16px; margin-bottom: 10px; border-radius: 8px; }
        .skel-line--short { width: 60%; }
        .skel-line--btn { height: 38px; border-radius: var(--radius-full); margin-top: 8px; }

        /* ── FLOATING CART BAR ── */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 8000;
            transform: translateY(100%);
            transition: transform 0.4s var(--ease-spring);
        }
        .cart-bar.visible {
            transform: translateY(0);
        }
        .cart-bar-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: var(--gray-800);
        }
        .cart-bar-count {
            background: var(--primary);
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
        }
        .cart-bar-total {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--primary);
        }
        .whatsapp-btn {
            padding: 12px 28px;
            border: none;
            border-radius: var(--radius-full);
            background: #25D366;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--duration) var(--ease);
            box-shadow: 0 8px 24px rgba(37, 211, 102, 0.3);
        }
        .whatsapp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(37, 211, 102, 0.4);
        }

        /* ── FOOTER ── */
        .footer {
            padding: 40px 0 100px;
            text-align: center;
            color: var(--gray-500);
            font-size: 0.85rem;
        }
        .footer a { color: var(--primary); font-weight: 600; }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
            .product-body { padding: 12px 14px 14px; }
            .product-name { font-size: 0.88rem; }
            .product-price { font-size: 1.05rem; margin-bottom: 10px; }
            .qty-btn { width: 32px; height: 32px; font-size: 0.9rem; }
            .add-btn { padding: 8px 10px; font-size: 0.78rem; }
            .cart-bar { padding: 12px 16px; }
        }
        @media (max-width: 480px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="page-bg"></div>
    <div class="bg-blob bg-blob--1"></div>
    <div class="bg-blob bg-blob--2"></div>

    <!-- NAVBAR -->
    <nav class="navbar glass-strong" id="main-nav">
        <span class="logo-text">Aura Sticks</span>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="catalogo.html" class="active">Catálogo</a>
            <a href="admin.html">Admin</a>
        </div>
    </nav>

    <!-- CATALOG -->

                <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-body"><div class="skel-line skeleton"></div><div class="skel-line skel-line--short skeleton"></div><div class="skel-line skel-line--btn skeleton"></div></div></div>
                <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-body"><div class="skel-line skeleton"></div><div class="skel-line skel-line--short skeleton"></div><div class="skel-line skel-line--btn skeleton"></div></div></div>
            </div>

            <div class="product-grid" id="product-grid" style="display: none;"></div>
        </div>
    </section>

            Pedir por WhatsApp
        </button>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 <a href="index.html">Aura Sticks</a> — Todos los derechos reservados</p>
